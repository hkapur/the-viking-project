<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Viking Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <header id="game-header">
      <h1>The Viking Project</h1>
      <p class="tagline">Pass. Shoot. Survive.</p>
      <p class="controls-hint">Click a teammate or press <kbd>1</kbd>–<kbd>5</kbd> to pass · Click the goal or press <kbd>Space</kbd> to shoot · <kbd>S</kbd> start · <kbd>P</kbd> pause · <kbd>R</kbd> restart</p>
    </header>
    <div id="hud">
      <div class="hud-panel">
        <span class="hud-label">Lives</span>
        <span id="lives-display" class="hud-value lives">♥ ♥ ♥</span>
      </div>
      <div class="hud-panel">
        <span class="hud-label">Level</span>
        <span id="level-display" class="hud-value">1</span>
      </div>
      <div class="hud-panel">
        <span class="hud-label">Nation</span>
        <span id="nation-display" class="hud-value nation">🇶🇦 Qatar</span>
      </div>
      <div class="hud-panel">
        <span class="hud-label">Time</span>
        <span id="timer-display" class="hud-value">0:00.0</span>
      </div>
    </div>
    <div id="game-controls">
      <button id="btn-start" type="button" class="game-btn game-btn-primary">Start <span class="btn-key">S</span></button>
      <button id="btn-pause" type="button" class="game-btn" disabled>Pause <span class="btn-key">P</span></button>
      <button id="btn-restart" type="button" class="game-btn">Restart <span class="btn-key">R</span></button>
      <select id="level-select" class="game-btn" title="Jump to level (Dev Test)">
        <option value="1">Round 1</option>
        <option value="2">Round 2</option>
        <option value="3">Round 3</option>
        <option value="4">Round 4</option>
        <option value="5">Round 5</option>
        <option value="6">Round 6</option>
        <option value="7">Round 7</option>
        <option value="8">Round 8</option>
        <option value="9">Round 9</option>
        <option value="10">Round 10</option>
      </select>
    </div>
    <div id="canvas-wrap">
      <canvas id="game-canvas" width="900" height="650"></canvas>
      <div id="message-overlay" class="hidden">
        <p id="message-text"></p>
      </div>
    </div>
    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="modal-title">World Champion!</h2>
        
        <!-- Score Submission -->
        <div id="submit-section">
          <p>Submit your score to the global leaderboard.</p>
          <div class="input-group">
            <input type="text" id="username-input" placeholder="Your Name" maxlength="15">
            <select id="country-select">
            </select>
          </div>
          <button id="btn-submit-score" class="game-btn game-btn-primary" style="margin-top: 15px;">Submit Score</button>
        </div>

        <!-- Leaderboard Display -->
        <div id="leaderboard-section" class="hidden">
          <h3>Global Top 10</h3>
          <ul id="leaderboard-list">
            <li>Loading...</li>
          </ul>
          <button id="btn-close-modal" class="game-btn" style="margin-top: 15px;">Close</button>
        </div>
      </div>
    </div>
  </div>
  <script src="countries.js"></script>
  <script src="firebase-env.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="game.js"></script>
</body>
</html>
